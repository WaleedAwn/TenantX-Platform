version: '3.9'

services:
  # Database Service for Tenant-X
  tenantx.database:
    image: postgres:16-alpine
    container_name: tenantx.database
    restart: always
    # Optimization: Set shared memory limit for better performance with Postgres
    shm_size: 128mb
    environment:
      POSTGRES_DB: tenantx_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./.containers/tenantx_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenantx_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tenantx-network

  # Database UI (Adminer) - Access via http://localhost:8080
  tenantx.adminer:
    image: adminer
    container_name: tenantx.adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - tenantx-network

  # Centralized Logging (Seq) - Access via http://localhost:8081
  # tenantx.seq:
  #   image: datalust/seq:latest
  #   container_name: tenantx.seq
  #   restart: always
  #   environment:
  #     ACCEPT_EULA: Y
  #   ports:
  #     - "5341:5341"  # Ingestion port
  #     - "8081:80"    # UI port
  #   volumes:
  #     - ./.containers/tenantx_seq:/data
  #   networks:
  #     - tenantx-network

networks:
  tenantx-network:
    driver: bridge